- type: entity
  id: CigarGoldenGang
  parent: CigarGold
  name: golden cigar
  suffix: Gang
  description: A luxurious gold-leafed cigar laced with a soothing medicinal blend. Only the finest from the boss.
  components:
  - type: SolutionContainerManager
    solutions:
      smokable:
        maxVol: 35
        reagents:
          - ReagentId: Nicotine
            Quantity: 15
          - ReagentId: Omnizine
            Quantity: 10

- type: entity
  id: GangBeginnerBundle
  name: gang beginner bundle
  suffix: Gang
  description: A duffel bag packed with everything a new gang member needs to get started.
  parent: ClothingBackpackDuffel
  components:
  - type: StorageFill
    contents:
    - id: GangSprayCan
      amount: 5
    - id: ClothingHeadsetGang
    - id: ClothingShoesGangDameDane
    - id: ClothingOuterGangDameDane
    - id: ClothingUniformGangDameDane
    - id: ClothingNeckGangTophat1
      orGroup: GangTophat
    - id: ClothingNeckGangTophat2
      orGroup: GangTophat
    - id: ClothingNeckGangTophat3
      orGroup: GangTophat
    - id: ClothingNeckGangTophat4
      orGroup: GangTophat
    - id: ClothingNeckGangTophat5
      orGroup: GangTophat
    - id: ClothingNeckGangTophat6
      orGroup: GangTophat

- type: entity
  id: GangGL06Bundle
  parent: ClothingBackpackSatchel
  name: GL-06 RGL kit
  suffix: Gang
  description: A satchel bag containing a GL-06 riot grenade launcher pre-loaded with two flash grenade shells.
  components:
  - type: StorageFill
    contents:
    - id: WeaponLauncherNonLethal
    - id: GrenadeFlash
      amount: 2

- type: entity
  parent: BaseItem
  id: Quickhack
  name: quickhack
  description: A covert device that fakes AI 'open' signals to unlock unbolted doors. Comes charged for 5 uses.
  components:
  - type: Quickhack
    closeDelay: 5
  - type: UseDelay
    delay: 1
  - type: LimitedCharges
    maxCharges: 5
    charges: 5
  - type: Sprite
    sprite: _Goobstation/Gangs/quickhack.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Gangs/quickhack.rsi
  - type: Appearance
  - type: StaticPrice
    price: 800

- type: entity
  parent: EncryptionKey
  id: EncryptionKeyGang
  name: gang encryption key
  suffix: Gang
  description: An encryption key used to communicate with gangs.
  components:
  - type: EncryptionKey
    channels:
    - Gang
    defaultChannel: Gang
  - type: Sprite
    layers:
    - state: crypt_red
    - state: synd_label

# gang headset
- type: entity
  parent: ClothingHeadsetChameleon
  id: ClothingHeadsetGang
  name: gang headset
  description: A modular headset pre-loaded with the gang frequency. Comes with a gang encryption key already installed.
  suffix: Gang
  components:
  - type: ContainerFill
    containers:
      key_slots:
      - EncryptionKeyGang
      - EncryptionKeyCommon
  - type: EncryptionKeyHolder
    keySlots: 2

- type: entity
  id: GangSprayCan
  name: gang spray can
  suffix: Gang
  description: A spray can used to mark territory for your gang. Only works if you belong to a gang.
  parent: BaseItem
  components:
  - type: Sprite
    sprite: _Goobstation/Gangs/spray_cans.rsi
    layers:
    - state: icon
  - type: Item
    sprite: _Goobstation/Gangs/spray_cans.rsi
    size: Small
  - type: Appearance
  - type: GangSprayCan

- type: entity
  name: gang machete
  suffix: Gang
  parent: Machete
  id: GangMachete
  description: A large, vicious looking blade.
  components:
  - type: SlasherMassacreMachete
    baseDamagePenalty: 12
    limbSeverHits: 6
    decapitateHit: 20 # makes it impossible
    speedBonusPerHit: 0
    healAmountPerHit: 0
