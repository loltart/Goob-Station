- type: entity
  id: GangLocker
  name: gang locker
  suffix: Gang
  parent: BaseStructure
  description: A locker belonging to a gang.
  components:
  - type: InteractionOutline
  - type: Transform
    noRot: true
  - type: Sprite
    noRot: true
    sprite: _Goobstation/Gangs/gang_locker.rsi
    layers:
    - state: icon
  - type: GangLocker
  - type: GangHiddenStructure
  - type: StatusIcon
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
  - type: Store
    name: gang-store-title
    categories:
    - GangStoreStarterEquipment
    - GangStoreConsumables
    - GangStoreWeapons
    - GangStoreEquipment
    currencyWhitelist:
    - GangPoint

- type: damageModifierSet
  id: GangCrate
  flatReductions:
    Blunt: 40
    Slash: 40
    Piercing: 40
    Heat: 40
    Shock: 40
    Structural: 40

- type: entity
  parent: CrateGeneric
  id: CrateGang
  name: gang crate
  description: A locked crate containing various goodies. Can only be opened next to a gang locker.
  suffix: Gang
  components:
  - type: Icon
    sprite: _Goobstation/Gangs/Crates/crate.rsi
    state: icon
  - type: Sprite
    noRot: true
    sprite: _Goobstation/Gangs/Crates/crate.rsi
    layers:
    - state: icon
      map: ["enum.StorageVisualLayers.Base"]
    - state: icon
      map: ["enum.StorageVisualLayers.Door"]
  - type: EntityStorageVisuals
    stateDoorOpen: icon_open
    stateDoorClosed: icon
  - type: Damageable
    damageModifierSet: GangCrate
  - type: Physics
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.4,-0.4,0.4,0.29"
        density: 600
  - type: GangCrate
  - type: StorageFill
    contents:
    # Legendary tier
    # PlushieMoth entry holds 80% = 20% chance one legendary item spawns.
    - id: PlushieMoth
      prob: 0.80
      orGroup: LegendaryItem
    - id: WeaponLauncherRocketDisposableThermobaric
      prob: 0.02
      orGroup: LegendaryItem
    - id: WeaponShotgunHeavy
      prob: 0.02
      orGroup: LegendaryItem
    - id: StorageImplant
      prob: 0.04
      orGroup: LegendaryItem
    - id: AutosurgeonSandevistan
      prob: 0.04
      orGroup: LegendaryItem
    - id: WeaponSniperHristov
      prob: 0.04
      orGroup: LegendaryItem
    - id: SpaceCash30000
      prob: 1.0
      orGroup: LegendaryItem
      amount: 2
    # Rare tier
    - id: CapoeiraManual
      prob: 0.05
    - id: KravMagaImplanter
      prob: 0.05
    - id: Omnitool
      prob: 0.05
