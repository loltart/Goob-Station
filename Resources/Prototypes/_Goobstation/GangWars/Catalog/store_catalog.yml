# Gang store currency
- type: currency
  id: GangPoint
  displayName: store-currency-display-gangpoint
  canWithdraw: false

# Gang store categories
- type: storeCategory
  id: GangStoreStarterEquipment
  name: gang-store-category-starter-equipment
  priority: -1

- type: storeCategory
  id: GangStoreConsumables
  name: gang-store-category-consumables
