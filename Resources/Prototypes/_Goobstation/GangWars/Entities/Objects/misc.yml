      amount: 2

- type: entity
  parent: [BaseItem, BaseMajorContraband]
  id: Quickhack
  name: quickhack
  description: A covert device that fakes AI 'open' signals to unlock unbolted doors. Comes charged for 5 uses.
  components:
  - type: Quickhack
  - type: UseDelay
    delay: 1
  - type: LimitedCharges
    maxCharges: 5
  - type: Sprite
    sprite: _Goobstation/Gangs/quickhack.rsi
    state: icon
  - type: Item
    sprite: _Goobstation/Gangs/quickhack.rsi
  - type: Appearance
  - type: StaticPrice
    price: 800

- type: entity
  parent: [EncryptionKey, BaseMajorContraband]
  id: EncryptionKeyGang
  name: gang encryption key
  suffix: Gang
  description: An encryption key used to communicate with gangs.
  components:
  - type: EncryptionKey
    channels:
    - Gang
    defaultChannel: Gang
  - type: Sprite
    layers:
    - state: crypt_red
    - state: synd_label

- type: entity
  id: GangSprayCan
  name: gang spray can
  suffix: Gang
  description: A spray can used to mark territory for your gang. Only works if you belong to a gang.
  parent: [BaseItem, BaseMajorContraband]
  components:
  - type: Sprite
    sprite: _Goobstation/Gangs/spray_cans.rsi
    layers:
    - state: icon
  - type: Item
    sprite: _Goobstation/Gangs/spray_cans.rsi
    size: Small
  - type: Appearance
  - type: GangSprayCan

- type: entity
