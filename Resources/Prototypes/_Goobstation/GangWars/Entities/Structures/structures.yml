- type: entity # Functions as a more common version of the crate. Odds are way lower for everything.
  id: GangDuffelBag
  parent: CrateGeneric
  name: gang duffel bag
  description: A battered duffel bag with a suspicious bulge inside. Looks like it's been rigged. Can only be opened next to a gang loc ker.
  suffix: Gang
  components:
  - type: Icon
    sprite: _Goobstation/Gangs/gang_duffel_bag.rsi
    state: icon_trapped
  - type: Sprite
    noRot: true
    sprite: _Goobstation/Gangs/gang_duffel_bag.rsi
    layers:
    - state: icon_trapped
      map: ["enum.StorageVisualLayers.Base"]
  - type: Damageable
