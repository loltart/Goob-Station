- type: entity
  parent: BaseSign
  id: GangSignBase
  abstract: true
  name: gang sign
  description: A gang sign, used by gang members to mark their territory. Its not a good idea to stand here, probably.
  components:
  - type: Sprite
    drawdepth: WallMountedItems
    sprite: _Goobstation/Gangs/gang_tags.rsi
    snapCardinals: true
  - type: GangTerritory
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 40
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          path: /Audio/Effects/poster_broken.ogg
      - !type:DoActsBehavior
        acts: ["Destruction"]

